<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>核算通 · 集团经营核算平台 Demo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="workbench.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark">核</div><div><strong>核算通</strong><span>集团经营核算平台</span></div></div>
      <nav class="nav-list">
        <button class="nav-link active" data-view="business-dashboard"><span class="nav-icon">⌂</span><b>经营核算工作台</b></button>
        <div class="nav-group open" id="group-executive">
          <button class="nav-group-title" data-nav-group="group-executive"><span>策</span><b>高层汇报中心</b><i>⌄</i></button>
          <div class="nav-children">
            <button class="nav-link" data-view="executive-dashboard">经营驾驶舱</button>
            <button class="nav-link" data-view="executive-summary">经营分析摘要</button>
            <button class="nav-link" data-view="product-line-alerts">产品线预警</button>
            <button class="nav-link" data-view="budget-attainment">预算达成</button>
          </div>
        </div>
        <div class="nav-group open" id="group-collection">
          <button class="nav-group-title" data-nav-group="group-collection"><span>采</span><b>数据采集中心</b><i>⌄</i></button>
          <div class="nav-children">
            <button class="nav-link" data-view="collection-dashboard">采集工作台</button>
            <button class="nav-link" data-view="revenue-collection">营收账单采集</button>
            <button class="nav-link" data-view="cost-collection">成本账单采集</button>
            <button class="nav-link" data-view="dingtalk-expense-collection">钉钉费用采集</button>
            <button class="nav-link" data-view="matching-rules">数据匹配规则</button>
            <button class="nav-link" data-view="collection-exceptions">异常数据处理</button>
            <button class="nav-link" data-view="collection-logs">采集日志</button>
          </div>
        </div>
        <button class="nav-link" data-view="product-accounting"><span class="nav-icon">▦</span><b>产品线核算</b></button>
        <div class="nav-group open" id="group-cost">
          <button class="nav-group-title" data-nav-group="group-cost"><span>本</span><b>成本管理</b><i>⌄</i></button>
          <div class="nav-children">
            <button class="nav-link" data-view="cost-dashboard-v2">成本工作台</button>
            <button class="nav-link" data-view="direct-costs">直接成本</button>
            <button class="nav-link" data-view="labor-costs">人工成本</button>
            <button class="nav-link" data-view="expense-costs">费用成本</button>
            <button class="nav-link" data-view="shared-cost-pool">公共成本池</button>
          </div>
        </div>
        <button class="nav-link" data-view="expense-collection"><span class="nav-icon">票</span><b>费用归集</b></button>
        <button class="nav-link" data-view="allocation-rules"><span class="nav-icon">↔</span><b>分摊规则</b></button>
        <div class="nav-group" id="group-payroll">
          <button class="nav-group-title" data-nav-group="group-payroll"><span>薪</span><b>薪酬核算</b><i>⌄</i></button>
          <div class="nav-children">
            <button class="nav-link" data-view="payroll-workbench">薪资计算工作台</button>
            <button class="nav-link" data-view="salary-profiles">薪资档案</button>
            <button class="nav-link" data-view="special-deductions">专项附加扣除</button>
            <button class="nav-link" data-view="annual-tax">个税计算明细（全年）</button>
          </div>
        </div>
        <div class="nav-group" id="group-tax">
          <button class="nav-group-title" data-nav-group="group-tax"><span>税</span><b>个税管理</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="tax-entities">报税主体管理</button><button class="nav-link" data-view="person-reporting">人员信息报送</button></div>
        </div>
        <div class="nav-group" id="group-payslip">
          <button class="nav-group-title" data-nav-group="group-payslip"><span>条</span><b>工资条管理</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="payslips">工资条</button><button class="nav-link" data-view="confirmations">员工确认记录</button></div>
        </div>
        <div class="nav-group" id="group-social">
          <button class="nav-group-title" data-nav-group="group-social"><span>保</span><b>社保公积金</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="insured-employees">参保人员</button><button class="nav-link" data-view="social-bills">月结账单</button></div>
        </div>
        <div class="nav-group" id="group-reports">
          <button class="nav-group-title" data-nav-group="group-reports"><span>报</span><b>报表中心</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="cost-dashboard">成本看板</button><button class="nav-link" data-view="payroll-reports">工资报表</button></div>
        </div>
        <div class="nav-group" id="group-settings">
          <button class="nav-group-title" data-nav-group="group-settings"><span>设</span><b>系统设置</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="group-settings">集团与公司</button><button class="nav-link" data-view="group-settings" data-setting-tab="lines">产品线及分摊规则</button><button class="nav-link" data-view="group-settings" data-setting-tab="permissions">用户与权限</button></div>
        </div>
      </nav>
      <div class="sidebar-foot"><div class="avatar">财</div><div><strong>财务管理员</strong><span>集团经营核算中心</span></div></div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div><p class="eyebrow" id="page-kicker">GROUP BUSINESS ACCOUNTING</p><h1 id="page-title">经营核算工作台</h1></div>
        <div class="top-actions">
          <label class="company-filter">所属公司<select id="global-company-filter"></select></label>
          <span class="status-pill"><i></i>2026 年 1 月</span>
        </div>
      </header>

      <section class="view active" id="view-business-dashboard"><div id="business-dashboard-root"></div></section>
      <section class="view" id="view-executive-dashboard"><div id="executive-dashboard-root"></div></section>
      <section class="view" id="view-executive-summary"><div id="executive-summary-root"></div></section>
      <section class="view" id="view-product-line-alerts"><div id="product-line-alerts-root"></div></section>
      <section class="view" id="view-budget-attainment"><div id="budget-attainment-root"></div></section>
      <section class="view" id="view-collection-dashboard"><div id="collection-dashboard-root"></div></section>
      <section class="view" id="view-revenue-collection"><div id="revenue-collection-root"></div></section>
      <section class="view" id="view-cost-collection"><div id="cost-collection-root"></div></section>
      <section class="view" id="view-dingtalk-expense-collection"><div id="dingtalk-expense-collection-root"></div></section>
      <section class="view" id="view-matching-rules"><div id="matching-rules-root"></div></section>
      <section class="view" id="view-collection-exceptions"><div id="collection-exceptions-root"></div></section>
      <section class="view" id="view-collection-logs"><div id="collection-logs-root"></div></section>
      <section class="view" id="view-product-accounting"><div id="product-accounting-root"></div></section>
      <section class="view" id="view-cost-dashboard-v2"><div id="cost-dashboard-v2-root"></div></section>
      <section class="view" id="view-direct-costs"><div id="direct-costs-root"></div></section>
      <section class="view" id="view-labor-costs"><div id="labor-costs-root"></div></section>
      <section class="view" id="view-expense-costs"><div id="expense-costs-root"></div></section>
      <section class="view" id="view-shared-cost-pool"><div id="shared-cost-pool-root"></div></section>
      <section class="view" id="view-expense-collection"><div id="expense-collection-root"></div></section>
      <section class="view" id="view-allocation-rules"><div id="allocation-rules-root"></div></section>
      <section class="view" id="view-dashboard"><div id="dashboard-root"></div></section>
      <section class="view" id="view-payroll-workbench"><div id="payroll-workbench-root"></div></section>
      <section class="view" id="view-salary-profiles"><div id="salary-profiles-root"></div></section>
      <section class="view" id="view-special-deductions"><div id="special-deductions-root"></div></section>
      <section class="view" id="view-annual-tax"><div id="annual-tax-root"></div></section>
      <section class="view" id="view-tax-entities"><div id="tax-entities-root"></div></section>
      <section class="view" id="view-person-reporting"><div id="person-reporting-root"></div></section>
      <section class="view" id="view-payslips"><div id="payslips-root"></div></section>
      <section class="view" id="view-confirmations"><div id="confirmations-root"></div></section>
      <section class="view" id="view-insured-employees"><div id="insured-employees-root"></div></section>
      <section class="view" id="view-social-bills"><div id="social-bills-root"></div></section>
      <section class="view" id="view-cost-dashboard"><div id="cost-dashboard-root"></div></section>
      <section class="view" id="view-payroll-reports"><div id="payroll-reports-root"></div></section>
      <section class="view" id="view-group-settings"><div id="group-settings-root"></div></section>
    </main>
  </div>

  <div class="modal" id="detail-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card"><button class="modal-close" data-close-modal>×</button><div id="modal-content"></div></div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="data.js"></script>
  <script src="payroll.js"></script>
  <script src="app.js"></script>
</body>
</html>
