<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>薪智通 · 集团薪酬管理 Demo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="workbench.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark">薪</div><div><strong>薪智通</strong><span>集团薪酬管理</span></div></div>
      <nav class="nav-list">
        <button class="nav-link active" data-view="dashboard"><span class="nav-icon">⌂</span><b>工作台</b></button>
        <div class="nav-group open" id="group-payroll">
          <button class="nav-group-title" data-nav-group="group-payroll"><span>¥</span><b>薪资计算</b><i>⌄</i></button>
          <div class="nav-children">
            <button class="nav-link" data-view="payroll-workbench">工作台</button>
            <button class="nav-link" data-view="salary-profiles">薪资档案</button>
            <button class="nav-link" data-view="special-deductions">专项附加扣除</button>
            <button class="nav-link" data-view="annual-tax">个税计算明细（全年）</button>
          </div>
        </div>
        <div class="nav-group" id="group-tax">
          <button class="nav-group-title" data-nav-group="group-tax"><span>税</span><b>个税管理</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="tax-entities">报税主体管理</button><button class="nav-link" data-view="person-reporting">人员信息报送</button></div>
        </div>
        <div class="nav-group" id="group-payslip">
          <button class="nav-group-title" data-nav-group="group-payslip"><span>▱</span><b>工资条管理</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="payslips">工资条</button><button class="nav-link" data-view="confirmations">员工确认记录</button></div>
        </div>
        <div class="nav-group" id="group-social">
          <button class="nav-group-title" data-nav-group="group-social"><span>保</span><b>社保公积金</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="insured-employees">参保人员</button><button class="nav-link" data-view="social-bills">月结账单</button></div>
        </div>
        <div class="nav-group" id="group-reports">
          <button class="nav-group-title" data-nav-group="group-reports"><span>▤</span><b>报表中心</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="cost-dashboard">成本看板</button><button class="nav-link" data-view="payroll-reports">工资报表</button></div>
        </div>
        <div class="nav-group" id="group-settings">
          <button class="nav-group-title" data-nav-group="group-settings"><span>⚙</span><b>系统设置</b><i>⌄</i></button>
          <div class="nav-children"><button class="nav-link" data-view="group-settings">集团与公司</button><button class="nav-link" data-view="group-settings" data-setting-tab="lines">产品线及分摊规则</button><button class="nav-link" data-view="group-settings" data-setting-tab="permissions">用户与权限</button></div>
        </div>
      </nav>
      <div class="sidebar-foot"><div class="avatar">财</div><div><strong>财务管理员</strong><span>集团薪酬中心</span></div></div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div><p class="eyebrow" id="page-kicker">GROUP PAYROLL</p><h1 id="page-title">集团薪酬工作台</h1></div>
        <div class="top-actions">
          <label class="company-filter">所属公司 <select id="global-company-filter"></select></label>
          <span class="status-pill"><i></i>2026 年 1 月</span>
          <button class="button primary" data-view-jump="payroll-workbench">进入薪资计算</button>
        </div>
      </header>

      <section class="view active" id="view-dashboard"><div id="dashboard-root"></div></section>
      <section class="view" id="view-payroll-workbench"><div id="payroll-workbench-root"></div></section>
      <section class="view" id="view-salary-profiles"><div id="salary-profiles-root"></div></section>
      <section class="view" id="view-special-deductions"><div id="special-deductions-root"></div></section>
      <section class="view" id="view-annual-tax"><div id="annual-tax-root"></div></section>
      <section class="view" id="view-tax-entities"><div id="tax-entities-root"></div></section>
      <section class="view" id="view-person-reporting"><div id="person-reporting-root"></div></section>
      <section class="view" id="view-payslips"><div id="payslips-root"></div></section>
      <section class="view" id="view-confirmations"><div id="confirmations-root"></div></section>
      <section class="view" id="view-insured-employees"><div id="insured-employees-root"></div></section>
      <section class="view" id="view-social-bills"><div id="social-bills-root"></div></section>
      <section class="view" id="view-cost-dashboard"><div id="cost-dashboard-root"></div></section>
      <section class="view" id="view-payroll-reports"><div id="payroll-reports-root"></div></section>
      <section class="view" id="view-group-settings"><div id="group-settings-root"></div></section>
    </main>
  </div>

  <div class="modal" id="detail-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card"><button class="modal-close" data-close-modal>×</button><div id="modal-content"></div></div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="data.js"></script>
  <script src="payroll.js"></script>
  <script src="app.js"></script>
</body>
</html>
